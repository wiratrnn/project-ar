<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Projek AR</title>
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
</head>
<body style="margin:0; overflow:hidden;">

  <a-scene embedded
           vr-mode-ui="enabled: false"
           renderer="logarithmicDepthBuffer: true;"
           arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best; cameraParametersUrl: https://raw.githack.com/AR-js-org/AR.js/master/data/data/camera_para.dat;">
    <a-marker preset="hiro">
      <a-entity gltf-model="url(pizza.glb)"
                scale="0.5 0.5 0.5"
                position="0 0 0"
                rotation="0 180 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
      </a-entity>
    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>

</body>
</html>
