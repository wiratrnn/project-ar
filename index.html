<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<style>
body{
margin:0;
overflow:hidden;
}

.menu{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
z-index:10;
}

button{
padding:10px 20px;
margin:5px;
font-size:16px;
}
</style>

</head>

<body>

<div class="menu">
<button onclick="changeModel('#ak47')">AK47</button>
<button onclick="changeModel('#pizza')">Pizza</button>
<button onclick="changeModel('#burger')">Burger</button>
</div>

<a-scene embedded arjs>

<a-assets>
<a-asset-item id="ak47" src="AK47.glb"></a-asset-item>
<a-asset-item id="pizza" src="pizza.glb"></a-asset-item>
<a-asset-item id="burger" src="burger.glb"></a-asset-item>
</a-assets>

<a-marker preset="hiro">

<a-entity
id="model3d"
gltf-model="#ak47"
scale="0.5 0.5 0.5"
position="0 0 0"
rotation="0 0 0"
animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
</a-entity>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

<script>
function changeModel(modelId){
document.querySelector("#model3d")
.setAttribute("gltf-model", modelId);
}
</script>

</body>
</html>
