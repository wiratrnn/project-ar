<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>WebAR - AR</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <style>
    html,body { height:100%; margin:0; }
    body { font-family:system-ui,Segoe UI,Roboto; overflow:hidden; }

    .menu{
      position:fixed;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      z-index:20;
      background: rgba(0,0,0,0.35);
      padding:8px;
      border-radius:8px;
      display:flex;
      gap:8px;
    }
    .menu button{
      padding:8px 12px;
      font-size:14px;
      color:#fff;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:6px;
      cursor:pointer;
    }

    #status {
      position:fixed;
      top:12px;
      left:50%;
      transform:translateX(-50%);
      z-index:30;
      background: rgba(0,0,0,0.6);
      color:#fff;
      padding:6px 10px;
      border-radius:6px;
      font-size:13px;
      pointer-events:none;
    }

    #error {
      position:fixed;
      top:60px;
      left:50%;
      transform:translateX(-50%);
      z-index:31;
      background: rgba(178,34,34,0.9);
      color:#fff;
      padding:8px 12px;
      border-radius:6px;
      font-size:13px;
      display:none;
      max-width:90%;
      text-align:center;
    }
  </style>
</head>
<body>
  <div id="status">Menunggu marker...</div>
  <div id="error"></div>

  <div class="menu" role="toolbar" aria-label="Pilih model">
    <button onclick="changeModel('#ak47')">AK47</button>
    <button onclick="changeModel('#pizza')">Pizza</button>
    <button onclick="changeModel('#burger')">Burger</button>
  </div>

  <a-scene embedded arjs="sourceType: webcam; facingMode: environment; debugUIEnabled: false;">
    <a-assets>
      <a-asset-item id="ak47" src="./AK47.glb"></a-asset-item>
      <a-asset-item id="pizza" src="./pizza.glb"></a-asset-item>
      <a-asset-item id="burger" src="./burger.glb"></a-asset-item>
    </a-assets>

    <a-marker preset="hiro" id="marker">
      <a-entity id="model3d"
                gltf-model="#ak47"
                scale="0.2 0.2 0.2"
                position="0 0.4 0"
                rotation="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
      </a-entity>
      <a-box id="fallback" visible="false" position="0 0.25 0" depth="0.4" height="0.4" width="0.4" color="#FF5555"></a-box>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const statusEl = document.getElementById('status');
    const errorEl = document.getElementById('error');
    const modelEntity = document.getElementById('model3d');
    const fallback = document.getElementById('fallback');
    const marker = document.getElementById('marker');

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function setError(text) {
      errorEl.style.display = 'block';
      errorEl.textContent = text;
      console.error('AR error:', text);
    }

    function clearError() {
      errorEl.style.display = 'none';
      errorEl.textContent = '';
    }

    function changeModel(assetId) {
      clearError();

      // Mencegah proses berulang jika menekan tombol model yang sudah aktif
      if (modelEntity.getAttribute('gltf-model') === assetId) {
        setStatus('Model sudah aktif — arahkan kamera ke marker');
        return;
      }

      setStatus('Mengganti model…');
      fallback.setAttribute('visible', 'false');

      // Ubah model langsung
      modelEntity.setAttribute('gltf-model', assetId);

      // Karena file sudah di-preload di <a-assets>, pemuatannya instan dari cache.
      // Kita beri jeda singkat untuk memastikan UI status terupdate dengan mulus.
      setTimeout(() => {
        setStatus('Model siap — arahkan kamera ke marker');
      }, 150); 
    };
      
      modelEntity.addEventListener('model-loaded', onLoaded);

      // Eksekusi perubahan model
      modelEntity.setAttribute('gltf-model', assetId);

      // 4. PERBAIKAN: Perpanjang durasi batas loading menjadi 15 detik (15000 ms)
      timeoutId = setTimeout(() => {
        setError('Gagal memuat model: koneksi lambat atau file terlampau besar. Cek console browser untuk detailnya.');
        fallback.setAttribute('visible', 'true');
        modelEntity.removeEventListener('model-loaded', onLoaded);
      }, 15000);
    }

    window.changeModel = changeModel;

    marker.addEventListener('markerFound', () => setStatus('Marker terdeteksi — menampilkan model'));
    marker.addEventListener('markerLost', () => setStatus('Marker tidak terlihat'));

    document.querySelector('a-scene').addEventListener('loaded', () => {
      setStatus('Scene siap, menunggu marker...');
      const assets = document.querySelectorAll('a-asset-item');
      assets.forEach(a => {
        a.addEventListener('error', () => {
          setError('Gagal memuat file: ' + a.getAttribute('src') + '. Pastikan file ada.');
        });
      });
    });

    fallback.setAttribute('visible', 'false');
  </script>
</body>
</html>
